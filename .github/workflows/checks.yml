name: checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ci.lock
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements-ci.lock) {
            pip install -r requirements-ci.lock
          } else {
            pip install -r requirements.txt
          }
      - name: Tokenization validator
        run: python scripts/tokenize_validate.py
      - name: Theme contrast validator
        run: python scripts/check_theme_contrast.py
      - name: Test suite (pytest + coverage)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests -q --cov=doxyedit --cov-report=xml --cov-report=term
      - name: Design manifest (offscreen screenshots)
        continue-on-error: true
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tools/design_manifest.py
      - name: Upload design manifest
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: design-manifest
          path: design_mockups/manifest_*.png
          if-no-files-found: ignore
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs
          path: |
            ~/.doxyedit/*.log
            coverage.xml
          if-no-files-found: ignore
